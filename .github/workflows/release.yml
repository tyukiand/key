name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  validate-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag matches Cargo.toml version
        run: |
          cargo_version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$cargo_version" != "$tag_version" ]; then
            echo "ERROR: Tag version '$tag_version' does not match Cargo.toml version '$cargo_version'"
            exit 1
          fi
          echo "Version '$cargo_version' matches tag."

  build:
    needs: validate-version
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux-x86_64
            target: x86_64-unknown-linux-gnu
          - runner: macos-latest
            platform: macos-x86_64
            target: x86_64-apple-darwin
          - runner: macos-latest
            platform: macos-arm64
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package zip
        run: |
          name="key-${{ github.ref_name }}-${{ matrix.platform }}"
          mkdir -p "$name/bin/${{ matrix.platform }}"
          cp target/${{ matrix.target }}/release/key "$name/bin/${{ matrix.platform }}/key"
          cp release/README.md "$name/README.md"
          zip -r "$name.zip" "$name"

      - uses: actions/upload-artifact@v4
        with:
          name: key-${{ github.ref_name }}-${{ matrix.platform }}
          path: key-${{ github.ref_name }}-${{ matrix.platform }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: key-${{ github.ref_name }}-linux-x86_64

      - uses: actions/download-artifact@v4
        with:
          name: key-${{ github.ref_name }}-macos-x86_64

      - uses: actions/download-artifact@v4
        with:
          name: key-${{ github.ref_name }}-macos-arm64

      - name: Create release
        run: |
          git fetch origin tag "$GITHUB_REF_NAME" --no-tags --force
          NOTES="$(git tag -l --format='%(contents)' "$GITHUB_REF_NAME")"
          gh release create "$GITHUB_REF_NAME" \
            --notes "$NOTES" \
            "key-${GITHUB_REF_NAME}-linux-x86_64.zip" \
            "key-${GITHUB_REF_NAME}-macos-x86_64.zip" \
            "key-${GITHUB_REF_NAME}-macos-arm64.zip"
        env:
          GH_TOKEN: ${{ github.token }}
